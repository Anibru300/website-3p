<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imágenes Extraídas del Catálogo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; padding: 20px; }
    h1 { text-align: center; margin-bottom: 30px; color: #00d4ff; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .item { background: #16213e; border-radius: 10px; padding: 15px; text-align: center; }
    .item h3 { margin-bottom: 10px; color: #e94560; font-size: 14px; }
    .item img { max-width: 100%; border-radius: 5px; border: 1px solid #0f3460; background: #0f3460; }
    .item .info { margin-top: 10px; font-size: 12px; color: #888; }
    .no-image { padding: 50px; color: #666; font-style: italic; }
  </style>
</head>
<body>
  <h1>📁 Imágenes Extraídas del Catálogo</h1>
  <div class="grid" id="gallery"></div>

  <script>
    const images = [
      { folder: 'alke', file: 'alke_page01.png', name: 'Alke' },
      { folder: 'fancom', file: 'fancom_page01.png', name: 'Fancom' },
      { folder: 'lbwhite', file: 'lbwhite_page01.png', name: 'LB White' },
      { folder: 'lubing', file: 'lubing_page01.png', name: 'Lubing' },
      { folder: 'schippers', file: 'schippers_page01.png', name: 'Schippers' },
      { folder: 'schippers', file: 'schippers-nuevos_page01.png', name: 'Schippers Nuevos' },
      { folder: 'tigsa', file: 'tigsa_page01.png', name: 'Tigsa' },
    ];

    const gallery = document.getElementById('gallery');
    
    images.forEach(img => {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <h3>${img.folder}/${img.file}</h3>
        <img src="${img.folder}/${img.file}" alt="${img.name}" 
             onerror="this.parentElement.innerHTML='<div class=no-image>❌ Imagen no disponible</div>'">
        <div class="info">Carpeta: ${img.folder}</div>
      `;
      gallery.appendChild(div);
    });
  </script>
</body>
</html>
